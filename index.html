<!DOCTYPE html>
<!-- v260624.1600 -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>色彩検定UC級｜学習モード</title>
<style>
:root {
  --bg: #F4F3F0;
  --surface: #FFFFFF;
  --border: #E0DDD7;
  --accent: #3B6EA5;
  --accent-light: #EAF0F8;
  --green: #2A8A5A;
  --green-light: #E8F5EE;
  --red: #C0392B;
  --red-light: #FDECEA;
  --orange: #C85A2A;
  --purple: #6A5ACD;
  --gold: #8B6914;
  --text: #1E1E1E;
  --text-sub: #666560;
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Meiryo UI','Hiragino Kaku Gothic ProN',sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  min-height: 100vh;
}

/* ── ヘッダー ── */
#app-header {
  background: var(--accent);
  color: #fff;
  padding: 14px 20px 10px;
  position: sticky;
  top: 0;
  z-index: 100;
}
#app-header h1 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
#progress-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}
#progress-bar-bg {
  flex: 1;
  height: 8px;
  background: rgba(255,255,255,.3);
  border-radius: 4px;
  overflow: hidden;
}
#progress-bar-fill {
  height: 100%;
  background: #7FDDAA;
  border-radius: 4px;
  transition: width .4s ease;
  width: 0%;
}
#progress-text {
  font-size: 12px;
  white-space: nowrap;
  opacity: .9;
}

/* ── モード切替 ── */
#mode-bar {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.mode-btn {
  flex-shrink: 0;
  padding: 7px 16px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: #fff;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  color: var(--text-sub);
  transition: all .15s;
}
.mode-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 700;
}
.mode-btn:hover:not(.active) { background: var(--accent-light); }

/* ── メインエリア ── */
#main {
  max-width: 680px;
  margin: 0 auto;
  padding: 20px 16px 80px;
}

/* ── クイズカード ── */
.quiz-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 22px 20px 18px;
  margin-bottom: 20px;
  position: relative;
}
.card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.card-type {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: .06em;
}
.type-quiz    { background: var(--accent); color:#fff; }
.type-blank   { background: var(--purple); color:#fff; }
.type-compare { background: var(--gold); color:#fff; }
.card-num { font-size: 12px; color: var(--text-sub); }
.card-chapter { font-size: 11px; color: var(--text-sub); background: var(--bg); padding: 3px 9px; border-radius: 20px; }

.question-text {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.55;
  margin-bottom: 16px;
}

/* 虫食い */
.blank-input {
  display: inline-block;
  border: none;
  border-bottom: 2px solid var(--accent);
  background: var(--accent-light);
  padding: 2px 8px;
  min-width: 60px;
  font-size: 16px;
  font-family: inherit;
  color: var(--text);
  text-align: center;
  border-radius: 4px 4px 0 0;
  outline: none;
}
.blank-input:focus { background: #D6E8F7; }
.blank-input.correct { background: var(--green-light); border-bottom-color: var(--green); color: var(--green); font-weight:700; }
.blank-input.wrong   { background: var(--red-light);   border-bottom-color: var(--red);   color: var(--red); }

/* 対比カード */
.compare-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.compare-cell {
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  border: 1px solid var(--border);
}
.compare-cell h3 {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 6px;
  padding-bottom: 5px;
  border-bottom: 2px solid var(--accent-light);
}
.compare-cell ul {
  list-style: none;
  padding: 0;
}
.compare-cell ul li {
  font-size: 13px;
  padding: 3px 0 3px 14px;
  position: relative;
  line-height: 1.5;
}
.compare-cell ul li::before {
  content: '・';
  position: absolute;
  left: 0;
  color: var(--accent);
}
.compare-hidden .compare-cell { filter: blur(5px); user-select:none; transition: filter .3s; }
.compare-hidden.revealed .compare-cell { filter: none; }

/* 答えエリア */
.answer-area {
  display: none;
  margin-top: 14px;
  padding: 14px 16px;
  background: var(--accent-light);
  border-radius: var(--radius-sm);
  border-left: 4px solid var(--accent);
}
.answer-area.show { display: block; }
.answer-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .08em;
  margin-bottom: 6px;
}
.answer-main {
  font-size: 14px;
  font-weight: 700;
  color: #1a3a5c;
  margin-bottom: 6px;
  line-height: 1.55;
}
.answer-detail {
  font-size: 13px;
  color: var(--text);
}
.answer-detail ul { list-style: none; padding: 0; margin-top: 4px; }
.answer-detail ul li {
  padding: 2px 0 2px 14px;
  position: relative;
  font-size: 13px;
  line-height: 1.5;
}
.answer-detail ul li::before { content:'・'; position:absolute; left:0; color:var(--accent); }

/* 語呂合わせ */
.memory-tip {
  display: none;
  margin-top: 10px;
  padding: 10px 14px;
  background: #FFFBEA;
  border-radius: var(--radius-sm);
  border-left: 4px solid #F0C040;
  font-size: 13px;
  line-height: 1.55;
}
.memory-tip.show { display: block; }
.memory-tip-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 4px;
}

/* ボタン群 */
.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.btn {
  flex: 1;
  min-width: 80px;
  padding: 11px 16px;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all .15s;
}
.btn-show  { background: var(--accent); color:#fff; }
.btn-show:hover  { background: #2d5a8a; }
.btn-ok    { background: var(--green); color:#fff; }
.btn-ok:hover    { background: #1e6b42; }
.btn-ng    { background: var(--red-light); color: var(--red); border: 1.5px solid var(--red); }
.btn-ng:hover    { background: #fbd5d2; }
.btn-check { background: var(--purple); color:#fff; }
.btn-check:hover { background: #5548b0; }
.btn-next  { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); }
.btn-next:hover  { background: var(--border); }
.btn:disabled { opacity: .4; cursor: default; }

/* マスター済みバッジ */
.mastered-badge {
  display: none;
  position: absolute;
  top: 14px;
  right: 16px;
  background: var(--green);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
}
.quiz-card.mastered .mastered-badge { display: block; }
.quiz-card.mastered { border-color: var(--green); }

/* ── 復習モード（まだリスト）── */
#retry-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-sub);
}
#retry-empty .emoji { font-size: 48px; margin-bottom: 12px; }
#retry-empty p { font-size: 15px; }

/* ── 対比一覧モード ── */
.compare-section { margin-bottom: 24px; }
.compare-section h2 {
  font-size: 14px;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 2px solid #E8D080;
}

/* スクロールトップボタン */
#scroll-top {
  position: fixed;
  bottom: 24px;
  right: 20px;
  width: 44px;
  height: 44px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 2px 10px rgba(0,0,0,.2);
  display: none;
  z-index: 50;
  line-height: 44px;
  text-align: center;
}

@media (max-width: 600px) {
  body { font-size: 17px; }
  #app-header { padding: 10px 14px 8px; }
  #app-header h1 { font-size: 15px; }
  #progress-text { font-size: 12px; }

  /* モードバー：2行グリッドに変更 */
  #mode-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    padding: 10px 12px;
    overflow-x: visible;
  }
  .mode-btn { font-size: 14px; padding: 10px 6px; text-align: center; }

  /* カード */
  .quiz-card { padding: 16px 14px 14px; }
  .card-type { font-size: 13px; }
  .card-num { font-size: 13px; }
  .card-chapter { font-size: 12px; }
  .question-text { font-size: 19px; }
  .answer-label { font-size: 13px; }
  .answer-main { font-size: 17px; }
  .answer-detail ul li { font-size: 15px; }

  /* 対比カード：縦1列に変更 */
  .compare-grid { grid-template-columns: 1fr; }
  .compare-cell h3 { font-size: 15px; }
  .compare-cell ul li { font-size: 15px; }

  /* 語呂合わせ */
  .memory-tip { font-size: 15px; }
  .memory-tip-label { font-size: 13px; }

  /* ボタン */
  .btn { font-size: 16px; padding: 14px 10px; }
  .btn-row { gap: 7px; }

  /* 図解ボタン（カード内） */
  .diag-btn { font-size: 14px !important; padding: 8px 14px !important; }

  /* 図解タブバー */
  .diag-tab { font-size: 13px !important; padding: 9px 12px !important; }

  /* 図解エリア内のセクションラベル */
  .caf-sec { font-size: 13px !important; }
  .caf-arrow-box { font-size: 13px !important; }
  .caf-ph { font-size: 13px !important; }

  /* モーダル */
  #diagram-modal { padding: 8px; }
  #diagram-modal-inner { max-height: 92vh; border-radius: 10px; }
  #diagram-modal-header { padding: 12px 14px; }
  #diagram-modal-title { font-size: 14px; }
  #diagram-modal-body { padding: 8px 4px 16px; overflow-x: hidden; }

  /* SVG はみ出し防止 */
  #diagram-modal-body svg { max-width: 100%; height: auto; }
  #diagram-modal-body div { max-width: 100%; overflow-x: hidden; }

  /* メモ欄 */
  .note-field { font-size: 16px; min-height: 80px; }
  .note-label { font-size: 14px; }
  .source-bar { font-size: 12px; }

  /* マスター済みバッジ */
  .mastered-badge { font-size: 12px; }

  /* 進捗テキスト */
  #progress-text { font-size: 12px; }
}

/* ── 図解モーダル ── */
#diagram-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
#diagram-modal.open { display: flex; }
#diagram-modal-inner {
  background: var(--surface);
  border-radius: var(--radius);
  max-width: 680px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,.2);
}
#diagram-modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 1;
}
#diagram-modal-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
#diagram-modal-close {
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  color: var(--text-sub);
  line-height: 1;
  padding: 0 4px;
}
#diagram-modal-body {
  padding: 12px 8px 20px;
  overflow-x: hidden;
  max-width: 100%;
}
</style>
</head>
<body>

<div id="app-header">
  <h1>🎨 色彩検定UC級｜学習モード</h1>
  <div id="progress-wrap">
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    <div id="progress-text">0 / 0 マスター</div>
  </div>
</div>

<div id="mode-bar">
  <button class="mode-btn active" onclick="setMode('all')">📚 全問</button>
  <button class="mode-btn" onclick="setMode('retry')">🔁 まだの問題</button>
  <button class="mode-btn" onclick="setMode('compare')">⚖️ 対比カード</button>
  <button class="mode-btn" onclick="setMode('diagrams')">🎨 図解</button>
</div>


<!-- 図解モーダル -->
<div id="diagram-modal" onclick="closeDiagramModal(event)">
  <div id="diagram-modal-inner">
    <div id="diagram-modal-header">
      <span id="diagram-modal-title"></span>
      <button id="diagram-modal-close" onclick="closeDiagramModalDirect()">✕</button>
    </div>
    <div id="diagram-modal-body"></div>
  </div>
</div>

<div id="main"></div>

<button id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
// ============================================================
//  図解モード
// ============================================================
const DIAGRAMS = [
  { id:'d01', title:'PCCS 色相環（24色相）',      subtitle:'各色をタップで番号・名前を確認', related:['q05','q16','b04','b07'] },
  { id:'d02', title:'PCCSトーンマップ（12トーン）', subtitle:'', related:['q05','q16','b04'] },
  { id:'d03', title:'色立体の断面図',              subtitle:'無彩色軸・彩度・純色の位置関係', related:['q05','q17'] },
  { id:'d04', title:'錐体と混同色線のつながり',    subtitle:'錐体の異常→P型/D型それぞれの混同の仕組み', related:['q03','q04','q06','q07','q08','q11','q22'] },
];

function renderDiagramsMode(main) {
  const intro = document.createElement('div');
  intro.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;font-size:13px;color:var(--text-sub);';
  intro.innerHTML = '<strong style="color:var(--text);font-size:14px;">🎨 図解モード</strong><br>タブで図を切り替え。各図の「関連問題」から問題に戻れます。';
  main.appendChild(intro);

  // タブバー
  const tabBar = document.createElement('div');
  tabBar.style.cssText = 'display:flex;gap:6px;overflow-x:auto;margin-bottom:16px;padding-bottom:2px;';
  
  // 図表示エリア
  const diagramArea = document.createElement('div');
  diagramArea.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;';

  let activeId = DIAGRAMS[0].id;

  function showDiagram(id) {
    activeId = id;
    // タブのactive状態更新
    tabBar.querySelectorAll('.diag-tab').forEach(btn => {
      const isActive = btn.dataset.id === id;
      btn.style.background = isActive ? 'var(--accent)' : 'var(--surface)';
      btn.style.color = isActive ? '#fff' : 'var(--text-sub)';
      btn.style.borderColor = isActive ? 'var(--accent)' : 'var(--border)';
      btn.style.fontWeight = isActive ? '700' : '400';
    });
    // 図を描画
    diagramArea.innerHTML = '';
    const d = DIAGRAMS.find(x => x.id === id);
    if (!d) return;

    // ヘッダー
    const hdr = document.createElement('div');
    hdr.style.cssText = 'padding:14px 16px 12px;border-bottom:1px solid var(--border);';
    hdr.innerHTML = `<div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px;">${d.title}</div><div style="font-size:12px;color:var(--text-sub);">${d.subtitle}</div>`;
    diagramArea.appendChild(hdr);

    // 図本体
    const DIAGRAM_FNS = { d01:getDiagramPCSS, d02:getDiagramTone, d03:getDiagramSolid, d04:getDiagramConesAndConfusion };
    const body = document.createElement('div');
    body.style.cssText = 'padding:12px 8px 16px;';
    const el = DIAGRAM_FNS[id]();
    if (typeof el === 'string') body.innerHTML = el;
    else body.appendChild(el);
    diagramArea.appendChild(body);

    // 関連問題
    const relWrap = document.createElement('div');
    relWrap.style.cssText = 'padding:10px 16px 14px;border-top:1px solid var(--border);';
    relWrap.innerHTML = '<span style="font-size:11px;color:var(--text-sub);margin-right:8px;">関連問題：</span>';
    d.related.forEach(qid => {
      const q = QUESTIONS.find(x => x.id === qid);
      if (!q) return;
      const num = QUESTIONS.indexOf(q) + 1;
      const btn = document.createElement('button');
      btn.textContent = 'Q' + num;
      btn.style.cssText = 'background:var(--accent-light);border:1px solid #C8D8EE;border-radius:20px;padding:3px 10px;font-size:11px;color:var(--accent);cursor:pointer;font-family:inherit;margin:2px;';
      btn.addEventListener('click', () => jumpToQuestion(qid));
      relWrap.appendChild(btn);
    });
    diagramArea.appendChild(relWrap);
  }

  // タブボタンを生成
  DIAGRAMS.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'diag-tab';
    btn.dataset.id = d.id;
    btn.textContent = d.title.length > 10 ? d.title.slice(0,10)+'…' : d.title;
    btn.style.cssText = 'flex-shrink:0;padding:8px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-size:12px;cursor:pointer;font-family:inherit;color:var(--text-sub);white-space:nowrap;transition:all .15s;';
    btn.addEventListener('click', () => showDiagram(d.id));
    tabBar.appendChild(btn);
  });

  main.appendChild(tabBar);
  main.appendChild(diagramArea);

  // 最初の図を表示
  showDiagram(activeId);
}

// ============================================================
//  問題データ
// ============================================================
const QUESTIONS = [

  // ── クイズ（quiz）型 ──
  {
    id:'q01', type:'quiz', chapter:'Ch.1 色のUDとは',
    q:'ユニバーサルデザイン（UD）とバリアフリーの本質的な違いは？',
    a:'UDは「最初から誰もが使いやすい設計」、バリアフリーは「障壁を後から取り除く対処」。',
    detail:['バリアフリー：特定の障害に対し後から障壁を除去する考え方','UD：年齢・性別・障害の有無にかかわらず最初から誰でも使えるよう設計','UC級では「多様性の尊重」というUD視点が重視される'],
    memory:'🧠 バリアフリー＝後付け対処、UD＝最初から設計。「後」か「最初」かで覚える！'
  },
  {
    id:'q02', type:'quiz', chapter:'Ch.1 色のUDとは',
    q:'色のUDの「3つのポイント」を答えよ。',
    a:'①色を適切に選ぶ ②色以外の情報も併用する ③確認・伝える（検証する）',
    detail:['①色を選ぶ：明度差・彩度差を活用し、混同色の組み合わせを避ける','②色以外を使う：形・模様・文字・アイコンを組み合わせる','③きちんと伝える：シミュレーションや当事者確認で検証する'],
    memory:'🧠 選ぶ→加える→確認する。3ステップの順番ごと覚えよう！'
  },
  {
    id:'q03', type:'quiz', chapter:'Ch.2 色が見えるしくみ',
    q:'L錐体・M錐体・S錐体はそれぞれ何色の光に最もよく反応するか？',
    a:'L錐体＝赤（長波長）、M錐体＝緑（中波長）、S錐体＝青（短波長）',
    detail:['L（Long）＝長波長＝赤系','M（Middle）＝中波長＝緑系','S（Short）＝短波長＝青系','P型はL錐体、D型はM錐体の異常'],
    memory:'🧠 L・M・Sは英語の長さ順。Long→赤、Middle→緑、Short→青。LMSで「赤緑青」！',
    diagrams:[['d04', '🔬 錐体と混同色線']]
  },
  {
    id:'q04', type:'quiz', chapter:'Ch.2 色が見えるしくみ',

// ============================================================
//  状態管理
// ============================================================
const LS_KEY = 'uc_quiz_progress';
let state = {}; // { [id]: 'ok' | 'ng' | undefined }
let currentMode = 'all';

function loadState() {
  try { state = JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch(e){ state={}; }
}
function saveState() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e){}
}
function masteredCount() { return Object.values(state).filter(v=>v==='ok').length; }
function updateProgress() {
  const total = QUESTIONS.length;
  const done  = masteredCount();
  const pct   = total ? Math.round(done/total*100) : 0;
  document.getElementById('progress-bar-fill').style.width = pct+'%';
  document.getElementById('progress-text').textContent = `${done} / ${total} マスター`;
}

// ============================================================
//  モード切替
// ============================================================
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  renderMain();
}

// ============================================================
//  レンダリング
// ============================================================

// 図解ボタンをカードにDOMで追加するヘルパー
function jumpToQuestion(id) {
  currentMode = 'all';
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.mode-btn').classList.add('active');
  renderMain();
  setTimeout(() => {
    const el = document.getElementById('card-' + id);
    if (el) {
      el.scrollIntoView({ behavior:'smooth', block:'center' });
      el.style.transition = 'box-shadow .3s';
      el.style.boxShadow = '0 0 0 3px var(--accent)';
      setTimeout(() => el.style.boxShadow = '', 1800);
    }
  }, 100);
}

function attachDiagramButtons(card, q) {
  if (!q.diagrams || !q.diagrams.length) return;
  const diagDiv = document.createElement('div');
  diagDiv.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;margin:12px 18px 0;';
  q.diagrams.forEach(([did, label]) => {
    const btn = document.createElement('button');
    btn.textContent = label;
    btn.style.cssText = 'background:#FFF8E8;border:1.5px solid #E8D080;border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600;color:#8B6914;cursor:pointer;font-family:inherit;';
    btn.addEventListener('click', () => {
      // 図解タブに切り替えて該当図を表示
      currentMode = 'diagrams';
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.mode-btn').forEach(b => {
        if (b.textContent.includes('図解')) b.classList.add('active');
      });
      renderMain();
      // 少し待ってからその図のタブをクリック
      setTimeout(() => {
        const tabBtn = document.querySelector(`.diag-tab[data-id="${did}"]`);
        if (tabBtn) tabBtn.click();
        window.scrollTo({top:0, behavior:'smooth'});
      }, 50);
    });
    diagDiv.appendChild(btn);
  });
  const answerArea = card.querySelector('.answer-area');
  if (answerArea) card.insertBefore(diagDiv, answerArea);
  else card.appendChild(diagDiv);
}
function renderMain() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  if (currentMode === 'compare') {
    renderCompareMode(main); return;
  }
  if (currentMode === 'diagrams') {
    renderDiagramsMode(main); return;
  }

  let list = QUESTIONS;
  if (currentMode === 'retry') {
    list = QUESTIONS.filter(q => state[q.id] !== 'ok');
    if (list.length === 0) {
      main.innerHTML = `<div id="retry-empty"><div class="emoji">🎉</div><p>全問マスター済みです！<br>おつかれさまでした。</p></div>`;
      return;
    }
  }

  list.forEach((q,i) => {
    const card = document.createElement('div');
    card.className = 'quiz-card' + (state[q.id]==='ok' ? ' mastered' : '');
    card.id = 'card-'+q.id;
    card.innerHTML = buildCard(q, i+1);
    attachDiagramButtons(card, q);
    main.appendChild(card);
  });
}

function buildCard(q, num) {
  const typeLabel = q.type==='quiz' ? 'クイズ' : q.type==='blank' ? '虫食い' : '対比';
  const typeClass = q.type==='quiz' ? 'type-quiz' : q.type==='blank' ? 'type-blank' : 'type-compare';

  let questionHTML = '';
  if (q.type === 'blank') {
    // 虫食い入力欄を生成
    let text = q.q;
    (q.blanks||[]).forEach((key,i) => {
      text = text.replace(`[${key}]`,
        `<input class="blank-input" data-idx="${i}" data-id="${q.id}" maxlength="6" placeholder="?" autocomplete="off">`);
    });
    questionHTML = `<div class="question-text">${text}</div>`;
  } else if (q.type === 'compare') {
    questionHTML = `<div class="question-text">${q.q}</div>
    <div class="compare-grid compare-hidden" id="compare-${q.id}">
      <div class="compare-cell">
        <h3>${q.left.title}</h3>
        <ul>${q.left.items.map(i=>`<li>${i}</li>`).join('')}</ul>
      </div>
      <div class="compare-cell">
        <h3>${q.right.title}</h3>
        <ul>${q.right.items.map(i=>`<li>${i}</li>`).join('')}</ul>
      </div>
    </div>`;
  } else {
    questionHTML = `<div class="question-text">${q.q}</div>`;
  }

  const detailHTML = (q.detail||[]).map(d=>`<li>${d}</li>`).join('');

  const diagBtnHTML = ''; // 図解ボタンはrenderMain内でDOMに直接追加

  let btnHTML = '';
  if (q.type === 'blank') {
    btnHTML = `
      <div class="btn-row">
        <button class="btn btn-check" onclick="checkBlanks('${q.id}')">✔ 答え合わせ</button>
        <button class="btn btn-ok" onclick="markOk('${q.id}')" id="btn-ok-${q.id}" ${state[q.id]==='ok'?'':'disabled'}>わかった 👍</button>
        <button class="btn btn-ng" onclick="markNg('${q.id}')">まだ 👎</button>
      </div>`;
  } else if (q.type === 'compare') {
    btnHTML = `
      <div class="btn-row">
        <button class="btn btn-show" onclick="revealCompare('${q.id}')">👁 答えを見る</button>
        <button class="btn btn-ok" onclick="markOk('${q.id}')">わかった 👍</button>
        <button class="btn btn-ng" onclick="markNg('${q.id}')">まだ 👎</button>
      </div>`;
  } else {
    btnHTML = `
      <div class="btn-row">
        <button class="btn btn-show" onclick="showAnswer('${q.id}')">💡 答えを見る</button>
        <button class="btn btn-ok" onclick="markOk('${q.id}')" id="btn-ok-${q.id}" disabled>わかった 👍</button>
        <button class="btn btn-ng" onclick="markNg('${q.id}')">まだ 👎</button>
      </div>`;
  }

  return `
    <span class="mastered-badge">✅ マスター済み</span>
    <div class="card-meta">
      <span class="card-type ${typeClass}">${typeLabel}</span>
      <span class="card-num">Q${num}</span>
      <span class="card-chapter">${q.chapter}</span>
    </div>
    ${questionHTML}
    ${diagBtnHTML}
    <div class="answer-area" id="ans-${q.id}">
      <div class="answer-label">ANSWER</div>
      <div class="answer-main">${q.a}</div>
      <div class="answer-detail"><ul>${detailHTML}</ul></div>
    </div>
    <div class="memory-tip" id="tip-${q.id}">
      <div class="memory-tip-label">💡 暗記のコツ</div>
      ${q.memory||''}
    </div>
    ${btnHTML}
  `;
}

// 対比モード（一覧表示）
function renderCompareMode(main) {
  const compares = QUESTIONS.filter(q=>q.type==='compare');
  const section = document.createElement('div');
  section.className = 'compare-section';
  section.innerHTML = '<h2>⚖️ 対比カード一覧（タップで内容を表示）</h2>';
  compares.forEach((q,i) => {
    const card = document.createElement('div');
    card.className = 'quiz-card' + (state[q.id]==='ok' ? ' mastered' : '');
    card.id = 'card-'+q.id;
    card.innerHTML = buildCard(q, i+1);
    attachDiagramButtons(card, q);
    section.appendChild(card);
  });
  main.appendChild(section);
}

// ============================================================
//  インタラクション
// ============================================================
function showAnswer(id) {
  document.getElementById('ans-'+id).classList.add('show');
  document.getElementById('tip-'+id).classList.add('show');
  const okBtn = document.getElementById('btn-ok-'+id);
  if(okBtn) okBtn.disabled = false;
}

function revealCompare(id) {
  const el = document.getElementById('compare-'+id);
  if(el) el.classList.toggle('revealed');
  document.getElementById('tip-'+id).classList.add('show');
}

function checkBlanks(id) {
  const q = QUESTIONS.find(q=>q.id===id);
  const inputs = document.querySelectorAll(`[data-id="${id}"]`);
  let allCorrect = true;
  inputs.forEach((inp,i) => {
    const correct = (q.answers[i]||'').toString().trim();
    const val = inp.value.trim();
    if (val === correct) {
      inp.classList.remove('wrong'); inp.classList.add('correct');
    } else {
      inp.classList.remove('correct'); inp.classList.add('wrong');
      allCorrect = false;
    }
  });
  document.getElementById('ans-'+id).classList.add('show');
  document.getElementById('tip-'+id).classList.add('show');
  const okBtn = document.getElementById('btn-ok-'+id);
  if(okBtn) okBtn.disabled = !allCorrect;
}

function markOk(id) {
  state[id] = 'ok';
  saveState();
  updateProgress();
  const card = document.getElementById('card-'+id);
  if(card) card.classList.add('mastered');
  // retryモードなら即再描画
  if(currentMode === 'retry') {
    setTimeout(() => {
      card.style.transition='opacity .3s';
      card.style.opacity='0';
      setTimeout(()=>renderMain(), 350);
    }, 400);
  }
}

function markNg(id) {
  state[id] = 'ng';
  saveState();
  const card = document.getElementById('card-'+id);
  if(card) card.classList.remove('mastered');
  updateProgress();
}

// ── 共通ユーティリティ ──
function polar(cx, cy, angle, r) {
  const rad = (angle - 195) * Math.PI / 180;
  return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
}
function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
  return el;
}
function makeTooltip(container) {
  const tip = document.createElement('div');
  tip.style.cssText = 'position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;line-height:1.55;color:var(--text);pointer-events:none;display:none;z-index:999;box-shadow:0 2px 10px rgba(0,0,0,.12);max-width:200px;';
  container.style.position = 'relative';
  container.appendChild(tip);
  return tip;
}
function showTip(tip, e, html) {
  tip.innerHTML = html;
  tip.style.display = 'block';
  moveTip(tip, e);
}
function moveTip(tip, e) {
  const rect = tip.parentElement.getBoundingClientRect();
  const tw = 200;
  const th = 70;
  let x = e.clientX - rect.left + 12;
  let y = e.clientY - rect.top - 10;
  if (x + tw > rect.width)  x = e.clientX - rect.left - tw - 8;
  if (x < 0) x = 4;
  if (y + th > rect.height) y = e.clientY - rect.top - th - 8;
  if (y < 0) y = 4;
  tip.style.left = x + 'px';
  tip.style.top  = y + 'px';
}
function hideTip(tip) { tip.style.display = 'none'; }

    {n:8,  label:'8:Y',  name:'黄（心理4原色）', en:'イエロー',             color:'#D0B000', primary:true},
    {n:9,  label:'9:gY', name:'緑みの黄',      en:'グリーニッシュ・イエロー', color:'#B0A800'},
    {n:10, label:'10:YG',name:'黄緑',          en:'イエロー・グリーン',     color:'#809800'},
    {n:11, label:'11:yG',name:'黄みの緑',      en:'イエローイッシュ・グリーン',color:'#588028'},
    {n:12, label:'12:G', name:'緑（心理4原色）', en:'グリーン',             color:'#307838', primary:true},
    {n:13, label:'13:bG',name:'青みの緑',      en:'ブルーイッシュ・グリーン', color:'#287860'},
    {n:14, label:'14:BG',name:'青緑',          en:'ブルー・グリーン',       color:'#187870'},
    {n:15, label:'15:BG',name:'青緑',          en:'ブルー・グリーン',       color:'#107078'},
    {n:16, label:'16:gB',name:'緑みの青',      en:'グリーニッシュ・ブルー',  color:'#106888'},
    {n:17, label:'17:B', name:'青',            en:'ブルー',               color:'#1860A8'},
    {n:18, label:'18:B', name:'青（心理4原色）', en:'ブルー',               color:'#2050B0', primary:true},
    {n:19, label:'19:pB',name:'紫みの青',      en:'パープリッシュ・ブルー',  color:'#3040B0'},
    {n:20, label:'20:V', name:'青紫',          en:'バイオレット',          color:'#4828A8'},
    {n:21, label:'21:bP',name:'青みの紫',      en:'ブルーイッシュ・パープル', color:'#6028A8'},
    {n:22, label:'22:P', name:'紫',            en:'パープル',             color:'#7828A8'},
    {n:23, label:'23:rP',name:'赤みの紫',      en:'レディッシュ・パープル',  color:'#982890'},
    {n:24, label:'24:RP',name:'赤紫',          en:'レッド・パープル',       color:'#B82068'},
  ];

  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('width', '100%');
  svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
  svg.style.cssText = 'display:block;max-width:360px;';

  hues.forEach((hue, i) => {
    const angle = i * sliceAngle;
    const a1 = angle - sliceAngle/2, a2 = angle + sliceAngle/2;
    const [ox1,oy1] = polar(cx,cy,a1,outerR);
    const [ox2,oy2] = polar(cx,cy,a2,outerR);
    const [ix1,iy1] = polar(cx,cy,a2,innerR);
    const [ix2,iy2] = polar(cx,cy,a1,innerR);
    const pathD = `M${ox1},${oy1} A${outerR},${outerR} 0 0,1 ${ox2},${oy2} L${ix1},${iy1} A${innerR},${innerR} 0 0,0 ${ix2},${iy2} Z`;

    const g = svgEl('g', {cursor:'pointer'});
    const path = svgEl('path', {d:pathD, fill:hue.color, stroke:'white', 'stroke-width':'1.5'});
    g.appendChild(path);

    // 番号
    const [lx,ly] = polar(cx,cy,angle,midR);
    const num = svgEl('text', {x:lx, y:ly, 'text-anchor':'middle', 'dominant-baseline':'central', 'font-size': Math.max(9, size*0.028), 'font-weight':'500', fill:'white', 'font-family':'Meiryo UI,sans-serif'});
    num.textContent = hue.n;
    g.appendChild(num);

    // 外側ラベル
    const [tlx,tly] = polar(cx,cy,angle,outerR+size*0.045);
    const lbl = svgEl('text', {x:tlx, y:tly, 'text-anchor':'middle', 'dominant-baseline':'central', 'font-size': Math.max(8, size*0.022), fill:'#888', 'font-family':'Meiryo UI,sans-serif'});
    lbl.textContent = hue.label;
    svg.appendChild(lbl);

    // 心理4原色マーカー
    if (hue.primary) {
      const [px,py] = polar(cx,cy,angle,outerR+size*0.02);
      const dot = svgEl('circle', {cx:px, cy:py, r:3.5, fill:'#333', opacity:'0.5'});
      svg.appendChild(dot);
    }

    // ホバー
    g.addEventListener('mouseenter', e => {
      path.setAttribute('stroke-width','3');
      showTip(tip, e, `<strong>${hue.label}　${hue.name}</strong><br>${hue.en}`);
    });
    g.addEventListener('mousemove', e => moveTip(tip, e));
    g.addEventListener('mouseleave', () => { path.setAttribute('stroke-width','1.5'); hideTip(tip); });
    // タップ対応
    g.addEventListener('click', e => {
      if (tip.style.display === 'none') {
        showTip(tip, e, `<strong>${hue.label}　${hue.name}</strong><br>${hue.en}`);
      } else { hideTip(tip); }
    });

    svg.appendChild(g);
  });

  // 中央
  const cbg = svgEl('circle', {cx, cy, r:innerR-3, fill:'var(--surface)', stroke:'var(--border)', 'stroke-width':'0.5'});
  svg.appendChild(cbg);
  const ct1 = svgEl('text', {x:cx, y:cy-10, 'text-anchor':'middle', 'dominant-baseline':'central', 'font-size':size*0.038, 'font-weight':'500', fill:'var(--text)', 'font-family':'Meiryo UI,sans-serif'});
  ct1.textContent = 'PCCS';
  svg.appendChild(ct1);
  const ct2 = svgEl('text', {x:cx, y:cy+8, 'text-anchor':'middle', 'dominant-baseline':'central', 'font-size':size*0.027, fill:'#888', 'font-family':'Meiryo UI,sans-serif'});
  ct2.textContent = '24色相環';
  svg.appendChild(ct2);
  const ct3 = svgEl('text', {x:cx, y:cy+22, 'text-anchor':'middle', 'dominant-baseline':'central', 'font-size':size*0.024, fill:'#aaa', 'font-family':'Meiryo UI,sans-serif'});
  ct3.textContent = '●＝心理4原色';
  svg.appendChild(ct3);

  wrap.appendChild(svg);

  // 凡例
  const legend = document.createElement('div');
  legend.style.cssText = 'display:flex;flex-wrap:wrap;justify-content:center;gap:4px 12px;font-size:11px;color:#888;';
  [{color:'#D02030',name:'赤(R)'},{color:'#C8A800',name:'黄(Y)'},{color:'#286830',name:'緑(G)'},{color:'#2838A0',name:'青(B)'}].forEach(p => {
    legend.innerHTML += `<span style="display:inline-flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:${p.color};display:inline-block;"></span>心理4原色 ${p.name}</span>`;
  });
  wrap.appendChild(legend);
  return wrap;
}
